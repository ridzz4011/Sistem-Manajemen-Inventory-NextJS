services:
  web:
    container_name: nextjs-inv-app
    build:
      context: .
      target: dev
      dockerfile: Dockerfile
    restart: always
    environment:
      - NODE_ENV=development
    command: npm run docker:dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env
    depends_on:
      - db
  db:
    container_name: nextjs-inv-db
    image: postgres:18.4-alpine
    restart: always
    environment:
      POSTGRES_DB: $POSTGRES_DB
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
    ports:
      - "5432:5432"
    expose:
      - "5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: