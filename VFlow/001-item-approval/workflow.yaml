version: "3.0"

metadata:
  id: item-approval
  name: "Item Approval Workflow"
  description: |
    Workflow persetujuan barang baru berdasarkan nilai barang.

spec:
  activities:
    - id: trigger
      activity_type: Trigger

      trigger_config:
        trigger_type: webhook

        webhook_config:
          path: /inventory/item/create
          method: POST

        response_framing: length_prefixed

        end_activity: respond-approved

      output_variable: trigger_payload

    - id: evaluate_item
      activity_type: VRule

      rule_config:
        rule_set_id: item_rules_v1

      input_mappings:
        - target: item_price
          source:
            language: v-cel
            source: "trigger_payload.body.item_price"

      output_variable: rule_result

    - id: item_decision
      activity_type: Exclusive

    - id: approval_task
      activity_type: HumanTask

      persistence: ssot

      human_task_config:
        task_type: item-approval
        assignee: manager_operasional

        title: "High Value Item Approval"

        description: "Persetujuan barang bernilai tinggi"

        priority: 90

      input_mappings:
        - target: item
          source:
            language: spv1
            source: "$.trigger_payload.body"

      output_variable: approval_result

    - id: approved_response
      activity_type: Transform

      input_mappings:
        - target: response
          source:
            language: literal
            source: '{"status":"approved"}'

      output_variable: approved_response

    - id: rejected_response
      activity_type: Transform

      input_mappings:
        - target: response
          source:
            language: literal
            source: '{"status":"rejected"}'

      output_variable: rejected_response

    - id: respond-approved
      activity_type: EndTrigger

      end_trigger_config:
        trigger_ref: trigger

        final_response:
          language: spv1
          source: "$.approved_response"

    - id: respond-rejected
      activity_type: EndTrigger

      end_trigger_config:
        trigger_ref: trigger

        final_response:
          language: spv1
          source: "$.rejected_response"

    - id: end
      activity_type: End

  flows:
    - { id: f1, from: { node: trigger }, to: { node: evaluate_item } }

    - { id: f2, from: { node: evaluate_item }, to: { node: item_decision } }

    - {
        id: f3,
        from: { node: item_decision },
        to: { node: approval_task },
        condition: 'rule_result.decision == "REVIEW"',
        priority: 10,
      }

    - {
        id: f4,
        from: { node: item_decision },
        to: { node: approved_response },
        condition: 'rule_result.decision == "APPROVE"',
        priority: 20,
      }

    - { id: f5, from: { node: approval_task }, to: { node: approved_response } }

    - {
        id: f6,
        from: { node: approved_response },
        to: { node: respond-approved },
      }

    - {
        id: f7,
        from: { node: rejected_response },
        to: { node: respond-rejected },
      }

    - { id: f8, from: { node: respond-approved }, to: { node: end } }

    - { id: f9, from: { node: respond-rejected }, to: { node: end } }
