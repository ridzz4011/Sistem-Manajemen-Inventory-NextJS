schema_ref:
  path: "../schemas/vendor_fact_v1.yaml"
  namespace: "inventory.vendor"
  entity: "vendor_fact"
  version: 1

hit_policy: PRIORITY

rules:

  - id: "BLACKLIST_VENDOR"
    priority: 10
    enabled: true

    description: "Vendor masuk blacklist"

    when: "vendor_status == 'BLACKLISTED'"

    then:
      - kind: SET_DECISION
        decision: REJECT

  - id: "VALID_VENDOR"
    priority: 100
    enabled: true

    description: "Vendor valid"

    when: "vendor_status != 'BLACKLISTED'"

    then:
      - kind: SET_DECISION
        decision: REVIEW