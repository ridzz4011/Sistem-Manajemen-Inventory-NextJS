pack:
  id: examples/hot-connection-pack
  version: 0.1.0
  description: >
    Connection-only pack for upstream services. The server resolves the
    env:// names from the encrypted admin install payload, so these values do
    not need to exist in the vflow process environment.

connections:
  # Upstream database. Workflow code references this as:
  # pack://examples/hot-connection-pack/primary
  - name: primary
    kind: postgres
    url: env://HOT_PACK_POSTGRES_URL
    pool:
      max_size: 5
      min_idle: 1
      acquire_timeout_ms: 3000
      idle_timeout_ms: 30000

  # Upstream event broker. Workflow code references this as:
  # pack://examples/hot-connection-pack/events
  - name: events
    kind: nats
    urls: env://HOT_PACK_NATS_URL
    client_name: vflow-hot-pack-example

# Hot connection install does not upload workflows. Upload workflow.yaml through
# POST /api/admin/workflow/upload after this pack is installed.
workflows: []
