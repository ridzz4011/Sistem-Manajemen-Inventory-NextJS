version: "3.0"

metadata:
  id: kelompok2-stock-opname-workflow
  name: "Inventory Stock Opname Workflow"
  description: |
    Workflow stock opname dengan perhitungan selisih stok,
    klasifikasi otomatis menggunakan VRule,
    approval Kepala Gudang dan Direktur.

spec:
  activities:
    - id: trigger
      activity_type: Trigger

      trigger_config:
        trigger_type: webhook

        webhook_config:
          path: /webhook/kelompok2/inventory/stock-opname
          method: POST

        response_framing: length_prefixed

        end_activity: respond

      output_variable: trigger_payload

    - id: calculate_difference
      activity_type: Compute

      compute_config:
        language: v-starlark

        source: |
          def run(ctx):
              system_stock = ctx["system_stock"]
              physical_stock = ctx["physical_stock"]

              diff = abs(system_stock - physical_stock)

              return {
                  "stock_difference": diff
              }

        entry_fn: run

      input_mappings:
        - target: system_stock
          source:
            language: v-cel
            source: "trigger_payload.body.system_stock"

        - target: physical_stock
          source:
            language: v-cel
            source: "trigger_payload.body.physical_stock"

      output_variable: difference_result

    - id: classify_opname
      activity_type: VRule

      rule_config:
        rule_set_id: kelompok2_stock_opname_rules_v1

      input_mappings:
        - target: stock_difference
          source:
            language: v-cel
            source: "difference_result.stock_difference"

      output_variable: rule_result

    - id: opname_decision
      activity_type: Exclusive

    - id: kepala_gudang_approval
      activity_type: HumanTask

      persistence: ssot

      human_task_config:
        task_type: stock-opname-approval

        assignee: kepala_gudang

        title: "Approve Stock Opname"

        description: "Persetujuan stock opname normal"

        priority: 80

      output_variable: approval_result

    - id: direktur_review
      activity_type: HumanTask

      persistence: ssot

      human_task_config:
        task_type: stock-opname-investigation

        assignee: direktur

        title: "Investigasi Selisih Stok"

        description: "Review selisih stok besar"

        priority: 100

      output_variable: investigation_result

    - id: update_inventory
      activity_type: Http

      http_config:
        method: POST
        url: "https://sistem-manajemen-inventory-next-js.vercel.app/api/stock-opname/approve"
        headers:
          "Content-Type": "application/json"
          "Authorization": "Bearer KELOMPOK-2-JAYA-JAYA-JAYA"

      input_mappings:
        - target: body
          source:
            language: v-cel
            source: '{"requestId": trigger_payload.body.requestId, "stock_difference": difference_result.stock_difference}'

      output_variable: inventory_result

    - id: completed_response
      activity_type: Transform

      input_mappings:
        - target: response
          source:
            language: v-cel
            source: '{"status":"completed","difference":difference_result.stock_difference,"result":inventory_result}'

      output_variable: completed_response

    - id: respond
      activity_type: EndTrigger

      end_trigger_config:
        trigger_ref: trigger

        final_response:
          language: spv1
          source: "$.completed_response"

    - id: end
      activity_type: End

  flows:
    - { id: f1, from: { node: trigger }, to: { node: calculate_difference } }

    - {
        id: f2,
        from: { node: calculate_difference },
        to: { node: classify_opname },
      }

    - { id: f3, from: { node: classify_opname }, to: { node: opname_decision } }

    - {
        id: f5,
        from: { node: opname_decision },
        to: { node: direktur_review },
        condition: 'rule_result.decision == "PENDING" && trigger_payload.body.is_manual_approval != true',
        priority: 10,
      }

    - {
        id: f4,
        from: { node: opname_decision },
        to: { node: update_inventory },
        type: default,
        priority: 100,
      }

    - {
        id: f6,
        from: { node: kepala_gudang_approval },
        to: { node: update_inventory },
      }

    - {
        id: f7,
        from: { node: direktur_review },
        to: { node: update_inventory },
      }

    - {
        id: f8,
        from: { node: update_inventory },
        to: { node: completed_response },
      }

    - { id: f9, from: { node: completed_response }, to: { node: respond } }

    - { id: f10, from: { node: respond }, to: { node: end } }

  variables:
    - { name: trigger_payload, type: object }
    - { name: difference_result, type: object }
    - { name: rule_result, type: object }
    - { name: approval_result, type: object }
    - { name: investigation_result, type: object }
    - { name: inventory_result, type: object }
    - { name: completed_response, type: object }
