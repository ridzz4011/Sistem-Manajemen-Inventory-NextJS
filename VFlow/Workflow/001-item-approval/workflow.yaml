version: "3.0"
metadata:
  id: webhook/kelompok2-item-approval-v1
  name: "Item Approval Workflow"
  workflow_version: "1.0.0"
  description: |
    Workflow persetujuan barang. Barang bernilai normal disetujui otomatis
    melalui VRule dan ditulis ke database Next.js. Barang bernilai tinggi
    diarahkan ke HumanTask, lalu dilanjutkan ke callback Next.js setelah
    disetujui.
  dialect: vflow
  tags: [inventory, item, approval, vrule, nextjs]

spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        webhook_config: { path: /webhook/kelompok2/inventory/item/create, method: POST }
        response_framing: length_prefixed
        end_activity: respond-approved
      output_variable: trigger_payload

    - id: validate_item
      activity_type: Validate
      validate_config:
        input: "$.trigger_payload.body"
        schema:
          required: [requestId, item_sku, item_price, item_uom]
          properties:
            requestId: { type: string, min_length: 3 }
            type: { type: string }
            item_name: { type: string }
            item_sku: { type: string, min_length: 1 }
            item_price: { type: number, min: 0 }
            item_uom: { type: string, min_length: 1 }
            item_description: { type: string }
            is_manual_approval: { type: boolean }
      output_variable: validated_item

    - id: item_rules
      activity_type: VRule
      rule_config:
        rule_set_id: kelompok2_item_rules_v1
        rule_pack: "rules/kelompok2_item_rules_v1.vdicl"
        version_policy: latest
      input_mappings:
        - target: item_price
          source: { language: spv1, source: "$.trigger_payload.body.item_price" }
      output_variable: rule_result

    - id: decision
      activity_type: Exclusive
      description: "VRule decides whether the item is accepted automatically or needs manager review."

    - id: approval_task
      activity_type: HumanTask
      persistence: ssot
      human_task_config:
        task_type: item-approval
        assignee: manager_operasional
        title: "High Value Item Approval"
        description: "Persetujuan barang bernilai tinggi"
        priority: 90
      input_mappings:
        - target: item
          source: { language: spv1, source: "$.trigger_payload.body" }
        - target: rule
          source: { language: spv1, source: "$.rule_result" }
      output_variable: approval_result

    - id: call_nextjs_api
      activity_type: Connector
      persistence: ssot
      description: "Callback ke Next.js untuk membuat atau meng-upsert item setelah disetujui."
      connector_config:
        connector_ref: vastar.http
        operation: post
        timeout_ms: 5000
      input_mappings:
        - target: url
          source: { language: literal, source: "https://iphone-brutishly-subplot.ngrok-free.dev/api/items/create" }
        - target: headers
          source:
            language: vil-expr
            source: '{ "Authorization": "Bearer KELOMPOK-2-JAYA-JAYA-JAYA", "Content-Type": "application/json", "ngrok-skip-browser-warning": "true" }'
        - target: body
          source:
            language: v-cel
            source: '{"requestId": trigger_payload.body.requestId, "type": trigger_payload.body.type, "sku": trigger_payload.body.item_sku, "name": trigger_payload.body.item_name, "description": "Barang disetujui melalui Workflow VFlow", "basePrice": trigger_payload.body.item_price, "uom": trigger_payload.body.item_uom}'
      output_variable: api_result

    - id: approved_response
      activity_type: Transform
      input_mappings:
        - target: response
          source:
            language: v-cel
            source: '{"status": "accepted_and_written", "requestId": trigger_payload.body.requestId, "decision": rule_result.decision, "rule": rule_result, "api_response": api_result}'
      output_variable: approved_response

    - id: failed_response
      activity_type: Transform
      input_mappings:
        - target: response
          source:
            language: v-cel
            source: '{"status": "item_approval_failed", "requestId": trigger_payload.body.requestId, "reason": "workflow_error"}'
      output_variable: failed_response

    - id: respond-approved
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response: { language: spv1, source: "$.approved_response" }

    - id: respond-failed
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response: { language: spv1, source: "$.failed_response" }

    - id: end
      activity_type: End

  flows:
    - { id: f01, from: { node: trigger }, to: { node: validate_item } }
    - { id: f02, from: { node: validate_item }, to: { node: item_rules } }
    - { id: f03, from: { node: item_rules }, to: { node: decision } }
    - { id: f04, from: { node: decision }, to: { node: call_nextjs_api }, condition: 'rule_result.decision == "ACCEPT"', priority: 30 }
    - { id: f05, from: { node: decision }, to: { node: approval_task }, condition: 'rule_result.decision == "REVIEW" && trigger_payload.body.is_manual_approval != true', priority: 20 }
    - { id: f06, from: { node: decision }, to: { node: failed_response }, type: default, priority: 0 }
    - { id: f07, from: { node: approval_task }, to: { node: call_nextjs_api } }
    - { id: f08, from: { node: call_nextjs_api }, to: { node: approved_response } }
    - { id: f09, type: error, from: { node: validate_item }, to: { node: failed_response } }
    - { id: f10, type: error, from: { node: item_rules }, to: { node: failed_response } }
    - { id: f11, type: error, from: { node: call_nextjs_api }, to: { node: failed_response } }
    - { id: f12, from: { node: approved_response }, to: { node: respond-approved } }
    - { id: f13, from: { node: failed_response }, to: { node: respond-failed } }
    - { id: f14, from: { node: respond-approved }, to: { node: end } }
    - { id: f15, from: { node: respond-failed }, to: { node: end } }

  variables:
    - { name: trigger_payload, type: object }
    - { name: validated_item, type: object }
    - { name: rule_result, type: object }
    - { name: approval_result, type: object }
    - { name: api_result, type: object }
    - { name: approved_response, type: object }
    - { name: failed_response, type: object }
