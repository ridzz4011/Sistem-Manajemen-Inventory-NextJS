version: "3.0"
metadata:
  id: kelompok2-item-approval
  name: "Item Approval Workflow"
  description: Workflow persetujuan barang yang menulis langsung ke DB setelah disetujui.
  dialect: vflow

spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        webhook_config: { path: /webhook/kelompok2/inventory/item/create, method: POST }
        # Kita ubah menjadi fire_and_forget karena VFlow yang akan nulis ke DB,
        # Next.js tidak perlu menunggu balasan statusnya berlama-lama.
        response_mode: fire_and_forget
        end_activity: respond
      output_variable: trigger_payload

    - id: evaluate_item
      activity_type: VRule
      rule_config:
        rule_set_id: item_rules_v1
      input_mappings:
        - target: item_price
          source:
            language: v-cel
            source: "trigger_payload.body.item_price"
      output_variable: rule_result

    - id: item_decision
      activity_type: ExclusiveGateway

    - id: approval_task
      activity_type: HumanTask
      persistence: ssot
      human_task_config:
        task_type: item-approval
        assignee: manager_operasional
        title: "High Value Item Approval"
        description: "Persetujuan barang bernilai tinggi"
        priority: 90
      input_mappings:
        - target: item
          source:
            language: spv1
            source: "$.trigger_payload.body"
      output_variable: approval_result

    # Menghubungkan DB ke API VFlow
    - id: call_nextjs_api
      activity_type: Http # (Atau RestCall, sesuaikan dengan dialect engine pembimbing jika berbeda)
      http_config:
        method: POST
        # GANTI URL INI dengan URL Ngrok atau Vercel Anda
        url: "https://iphone-brutishly-subplot.ngrok-free.dev"
        headers:
          # Token harus sama dengan yang ada di file .env Next.js Anda
          "Authorization": 'Bearer ${API_SECRET_KEY}'
          "Content-Type": "application/json"
      input_mappings:
        - target: body
          source:
            language: v-cel
            source: >
              {
                "sku": trigger_payload.body.item_sku,
                "name": trigger_payload.body.item_name,
                "description": "Barang disetujui melalui Workflow VFlow",
                "basePrice": trigger_payload.body.item_price,
                "uom": trigger_payload.body.item_uom
              }
      output_variable: api_result

    - id: build_response
      activity_type: Transform
      input_mappings:
        - target: response
          source:
            language: v-cel
            source: >
              {
                "status": "accepted_and_written",
                "api_response": api_result
              }
      output_variable: final_payload

    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response:
          language: spv1
          source: "$.final_payload"

    - id: end
      activity_type: End

  flows:
    - { id: f1, from: { node: trigger }, to: { node: evaluate_item } }
    - { id: f2, from: { node: evaluate_item }, to: { node: item_decision } }
    
    # Percabangan Evaluasi
    - {
        id: f3,
        from: { node: item_decision },
        to: { node: approval_task },
        condition: 'rule_result.outputs.decision == "REVIEW"',
        priority: 10,
      }
    - {
        id: f4,
        from: { node: item_decision },
        to: { node: call_nextjs_api },
        condition: 'rule_result.outputs.decision == "APPROVE"',
        priority: 20,
      }

    # Jika disetujui manager, lanjut tulis ke DB
    - { id: f5, from: { node: approval_task }, to: { node: call_nextjs_api } }
    
    # Setelah DB tertulis, bangun respons dan selesai
    - { id: f6, from: { node: call_nextjs_api }, to: { node: build_response } }
    - { id: f7, from: { node: build_response }, to: { node: respond } }
    - { id: f8, from: { node: respond }, to: { node: end } }

  variables:
    - { name: trigger_payload, type: object }
    - { name: rule_result, type: object }
    - { name: approval_result, type: object }
    - { name: api_result, type: object }
    - { name: final_payload, type: object }