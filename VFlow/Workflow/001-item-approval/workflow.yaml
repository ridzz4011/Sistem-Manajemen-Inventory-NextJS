version: "3.0"
metadata:
  id: kelompok2-item-approval-v15
  name: "Item Approval Workflow"
  description: Workflow persetujuan barang yang menulis langsung ke DB setelah disetujui.
  dialect: vflow

spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        webhook_config:
          { path: /webhook/kelompok2/inventory/item/create-v15, method: POST }
        response_mode: buffered
        end_activity: respond
      output_variable: trigger_payload

    - id: prepare_api_payload
      activity_type: Transform
      input_mappings:
        - target: payload
          source:
            language: v-cel
            source: '{"requestId": trigger_body.requestId, "sku": trigger_body.item_sku, "name": trigger_body.item_name, "description": "Barang disetujui melalui Workflow VFlow", "basePrice": trigger_body.item_price, "uom": trigger_body.item_uom}'
      output_variable: prepared_payload

    - id: evaluate_item
      activity_type: VRule
      rule_config:
        rule_set_id: kelompok2_item_approval_rules_v1
      input_mappings:
        - target: item_price
          source:
            { language: spv1, source: "$.trigger_payload.body.item_price" }
      output_variable: rule_result

    - id: item_decision
      activity_type: Exclusive

    - id: approval_task
      activity_type: HumanTask
      persistence: ssot
      human_task_config:
        task_type: item-approval
        assignee: manager_operasional
        title: "High Value Item Approval"
        description: "Persetujuan barang bernilai tinggi"
        priority: 90
      input_mappings:
        - target: item
          source:
            language: spv1
            source: "$.trigger_payload.body"
      output_variable: approval_result

    # Menghubungkan DB ke API VFlow
    - id: call_nextjs_api
      activity_type: Connector
      connector_config:
        connector_ref: vastar.http
        operation: post
        config:
          bearer_token: "KELOMPOK-2-JAYA-JAYA-JAYA"
      input_mappings:
        - target: url
          source:
            {
              language: literal,
              source: "https://iphone-brutishly-subplot.ngrok-free.dev/api/items/create",
            }
        - target: headers
          source:
            language: literal
            source: '{"Authorization": "Bearer KELOMPOK-2-JAYA-JAYA-JAYA", "Content-Type": "application/json", "ngrok-skip-browser-warning": "true"}'
        - target: body
          source: { language: spv1, source: "$.prepared_payload" }
      output_variable: api_result

    - id: build_response
      activity_type: Transform
      input_mappings:
        - target: response
          source:
            language: v-cel
            source: >
              {
                "status": "accepted_and_written",
                "api_response": api_result
              }
      output_variable: final_payload

    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response:
          language: spv1
          source: "$.final_payload"

    - id: end
      activity_type: End

  flows:
    - { id: f1, from: { node: trigger }, to: { node: prepare_api_payload } }
    - {
        id: f1a,
        from: { node: prepare_api_payload },
        to: { node: evaluate_item },
      }
    - { id: f2, from: { node: evaluate_item }, to: { node: item_decision } }

    # Percabangan Evaluasi: Jika VRule menghasilkan PENDING atau manual approval
    - {
        id: f3,
        from: { node: item_decision },
        to: { node: approval_task },
        condition: '(rule_result.decision == "PENDING" || prepared_payload.basePrice > 10000000)',
        priority: 10,
      }
    - {
        id: f4,
        from: { node: item_decision },
        to: { node: call_nextjs_api },
        type: default,
        priority: 100,
      }

    # Jika disetujui manager di human task, lanjut tulis ke DB
    - { id: f5, from: { node: approval_task }, to: { node: call_nextjs_api } }

    # Setelah DB tertulis, bangun respons dan selesai
    - { id: f6, from: { node: call_nextjs_api }, to: { node: build_response } }
    - { id: f7, from: { node: build_response }, to: { node: respond } }
    - { id: f8, from: { node: respond }, to: { node: end } }

  variables:
    - { name: trigger_payload, type: object }
    - { name: rule_result, type: object }
    - { name: approval_result, type: object }
    - { name: prepared_payload, type: object }
    - { name: api_result, type: object }
    - { name: final_payload, type: object }
