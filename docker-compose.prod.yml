services:
  web: # Menjalankan container Next.js untuk aplikasi inventory
    container_name: nextjs-inv-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - NODE_ENV=production
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - db
  db: # Membuat container database postgres untuk menyimpan data inventory
    container_name: nextjs-inv-db
    image: postgres:18.4-alpine
    restart: always
    environment:
      POSTGRES_DB: $POSTGRES_DB
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
    ports:
      - "5432:5432"
    expose:
      - "5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  db-tunnel: # Menghubungkan database lokal ke server vflow melalui rathole
    container_name: nextjs-inv-db-tunnel
    image: rapiz1/rathole:latest
    restart: always
    command: ["--client", "/app/client.toml"]
    volumes:
      - ./kel3-client.toml:/app/client.toml

volumes:
  db_data: